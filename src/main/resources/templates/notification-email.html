<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background-color: #1e293b; border-radius: 16px; overflow: hidden; border: 1px solid #334155; }
        .header { background-color: #eab308; padding: 20px; text-align: center; color: #000; font-weight: bold; font-size: 24px; }
        .content { padding: 30px; line-height: 1.6; }
        .title { font-size: 20px; color: #eab308; margin-bottom: 20px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; background-color: #0f172a; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #eab308; color: #000 !important; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">MovieSocial</div>
    <div class="content">
        <div class="title" th:text="${title}">Bildirim Başlığı</div>
        <p th:text="${message}">Bildirim içeriği buraya gelecek.</p>
        <div style="text-align: center;" th:if="${actionUrl != null}">
            <a th:href="${actionUrl}" class="btn" th:text="${buttonText}">Görüntüle</a>
        </div>
    </div>
    <div class="footer">
        © 2026 MovieSocial - Sinema Tutkunlarının Buluşma Noktası<br>
        Porto, Portekiz
    </div>
</div>
</body>
</html>
